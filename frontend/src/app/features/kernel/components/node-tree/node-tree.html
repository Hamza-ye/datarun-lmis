<div class="lmis-card">
    <h2>Node Directory (Facilities & Warehouses)</h2>

    <div class="table-actions">
        <mat-form-field appearance="outline" class="filter-field">
            <mat-label>Filter Nodes</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="E.g. Clinic" #input>
            <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
    </div>

    <div class="table-container mat-elevation-z2">
        <table mat-table [dataSource]="dataSource" matSort>

            <!-- UID Column -->
            <ng-container matColumnDef="uid">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Node ID </th>
                <td mat-cell *matCellDef="let element" class="id-col"> {{element.uid}} </td>
            </ng-container>

            <!-- Name Column -->
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
                <td mat-cell *matCellDef="let element">
                    <strong>{{element.name}}</strong>
                    <div class="muted-col">{{element.code}}</div>
                </td>
            </ng-container>

            <!-- Type Column -->
            <ng-container matColumnDef="node_type">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Type </th>
                <td mat-cell *matCellDef="let element">
                    <span class="type-badge">{{element.node_type}}</span>
                </td>
            </ng-container>

            <!-- Parent Column -->
            <ng-container matColumnDef="parent_id">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Parent Node </th>
                <td mat-cell *matCellDef="let element"> {{element.parent_id || 'Top-Level Registry'}} </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="lmis-row"></tr>
        </table>
    </div>

    <mat-paginator [pageSizeOptions]="[10, 25, 100]" aria-label="Select page of nodes"></mat-paginator>
</div>
