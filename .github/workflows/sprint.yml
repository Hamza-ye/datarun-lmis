name: Sprint Pipeline (CI)

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/sprint.yml"
  pull_request:
    paths:
      - "backend/**"
jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    # Only run if backend files or the workflow itself changed
    # if: github.event_name == 'pull_request' || contains(github.event.head_commit.modified, 'backend/')
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Ruff
        run: ruff check .
      - name: Run Pytest
        env:
          # Use SQLite for fast CI testing
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        run: pytest

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || contains(github.event.head_commit.modified, 'frontend/')
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint and Build
        run: |
          npm run lint --if-present
          npm run build
