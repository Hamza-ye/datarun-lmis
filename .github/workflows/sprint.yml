name: Sprint Pipeline (CI)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend-ci:
    name: Backend CI (Python/SQLite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff Check
        run: ruff check .

      - name: Run Pytest
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        run: pytest tests/

  frontend-ci:
    name: Frontend CI (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint Frontend
        run: npm run lint || echo "Linting skipped or failed (bootstrap phase)"

      - name: Build Angular App
        run: npm run build
